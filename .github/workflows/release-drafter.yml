name: Release Preparation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  detect_release_need:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
      last_tag: ${{ steps.detect.outputs.last_tag }}
      release_version: ${{ steps.detect.outputs.release_version }}
      release_version_code: ${{ steps.detect.outputs.release_version_code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect next release version and commit delta
        id: detect
        shell: bash
        run: |
          compare_versions() {
            local left="$1"
            local right="$2"
            IFS='.' read -r -a left_parts <<< "$left"
            IFS='.' read -r -a right_parts <<< "$right"
            local max_len=${#left_parts[@]}
            if [ ${#right_parts[@]} -gt "$max_len" ]; then
              max_len=${#right_parts[@]}
            fi

            for ((i=0; i<max_len; i++)); do
              local left_part=${left_parts[i]:-0}
              local right_part=${right_parts[i]:-0}
              if ((10#$left_part > 10#$right_part)); then
                echo 1
                return 0
              fi
              if ((10#$left_part < 10#$right_part)); then
                echo -1
                return 0
              fi
            done

            echo 0
          }

          increment_patch() {
            local version="$1"
            IFS='.' read -r major minor patch <<< "$version"
            major=${major:-0}
            minor=${minor:-0}
            patch=${patch:-0}
            echo "${major}.${minor}.$((10#$patch + 1))"
          }

          current_version=$(sed -n 's/.*versionName = "\(.*\)".*/\1/p' app/build.gradle.kts | head -n1)
          current_version_code=$(sed -n 's/.*versionCode = \([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n1)

          if [ -z "$current_version" ] || [ -z "$current_version_code" ]; then
            echo "Could not read versionName/versionCode from app/build.gradle.kts"
            exit 1
          fi

          last_tag=$(git tag --list 'v*' --sort=-creatordate | head -n1)
          if [ -z "$last_tag" ]; then
            has_changes=true
          else
            commit_count=$(git rev-list --count "${last_tag}..HEAD")
            if [ "$commit_count" -gt 0 ]; then
              has_changes=true
            else
              has_changes=false
            fi
          fi

          release_version="$current_version"
          release_version_code="$current_version_code"
          auto_bumped=false

          if [ -n "$last_tag" ]; then
            last_version=${last_tag#v}
            comparison_result=$(compare_versions "$release_version" "$last_version")
            if [ "$comparison_result" -le 0 ]; then
              release_version="$last_version"
            fi
          fi

          while git rev-parse -q --verify "refs/tags/v${release_version}" >/dev/null; do
            release_version=$(increment_patch "$release_version")
            release_version_code=$((10#$release_version_code + 1))
            auto_bumped=true
          done

          if [ "$auto_bumped" = true ]; then
            echo "Auto-bumped release version to v${release_version}"
          fi

          release_tag="v${release_version}"

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "last_tag=$last_tag" >> "$GITHUB_OUTPUT"
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_version_code=$release_version_code" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: detect_release_need
    if: needs.detect_release_need.outputs.has_changes == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update app version for this build
        shell: bash
        run: |
          perl -0pi -e 's/versionCode = \d+/versionCode = $ENV{RELEASE_VERSION_CODE}/' app/build.gradle.kts
          perl -0pi -e 's/versionName = ".*?"/versionName = "$ENV{RELEASE_VERSION}"/' app/build.gradle.kts
        env:
          RELEASE_VERSION: ${{ needs.detect_release_need.outputs.release_version }}
          RELEASE_VERSION_CODE: ${{ needs.detect_release_need.outputs.release_version_code }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Restore stable debug keystore
        id: debug_keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: vidrox-debug-keystore-v1

      - name: Create stable debug keystore
        if: steps.debug_keystore.outputs.cache-hit != 'true'
        shell: bash
        run: |
          # Keep GitHub debug APK releases upgrade-compatible across workflow runs.
          # This is only for debug signing continuity, not for production release signing.
          mkdir -p ~/.android
          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build project
        run: ./gradlew --no-daemon assembleDebug

      - name: Rename APK to app name
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/VidroX-${{ needs.detect_release_need.outputs.release_tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/VidroX-${{ needs.detect_release_need.outputs.release_tag }}.apk

  publish_release:
    needs:
      - detect_release_need
      - build
    if: needs.detect_release_need.outputs.has_changes == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v5
        with:
          name: app-debug-apk
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect_release_need.outputs.release_tag }}
          name: ${{ needs.detect_release_need.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-artifacts/VidroX-${{ needs.detect_release_need.outputs.release_tag }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
